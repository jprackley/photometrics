# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of the node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Photometrics Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build and Test Photometrics
    runs-on: ubuntu-latest

    environment: Test

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSLMODE: ${{ secrets.PGSSLMODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Verify database env exists
        run: |
          node -e "console.log('DATABASE_URL exists:', !!process.env.DATABASE_URL)"
          node -e "console.log('PGSSLMODE:', process.env.PGSSLMODE)"

      - name: Run Node tests
        run: npm test


